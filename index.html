<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock AI Vision</title>
  <style>
    body { font-family: Arial; padding: 15px; }
    input, textarea, button { width: 100%; margin-top: 10px; padding: 10px; }
    .card { border: 1px solid #ddd; padding: 10px; margin-top: 15px; border-radius: 10px; }
  </style>
</head>
<body>

<h2>Stock AI Vision (Auto Image Analysis)</h2>

<input type="file" id="fileInput" multiple />
<button onclick="generateAll()">Analyze Image + Generate AI</button>

<div id="output"></div>

<script>
let files = [];

const fileInput = document.getElementById('fileInput');
const output = document.getElementById('output');

fileInput.addEventListener('change', (e) => {
  files = Array.from(e.target.files).map(f => ({ file: f, meta: {} }));
  render();
});

async function analyzeImage(file) {
  const reader = new FileReader();

  return new Promise((resolve) => {
    reader.onload = () => {
      // SIMULASI AI VISION (bisa diganti API nanti)
      const name = file.name.toLowerCase();

      let context = "urban daily life";

      if (name.includes('warung') || name.includes('food')) context = "street food vendor";
      else if (name.includes('macet') || name.includes('traffic')) context = "traffic congestion";
      else if (name.includes('motor')) context = "motorcycle transportation";
      else if (name.includes('hp') || name.includes('phone')) context = "smartphone usage";

      resolve(context);
    };

    reader.readAsDataURL(file);
  });
}

function generateMeta(context) {
  return {
    title: `Indonesian ${context} in urban environment`,
    description: `Real life ${context} activity in Indonesia showing authentic urban lifestyle and daily life in Southeast Asia`,
    keywords: `${context}, indonesia, urban, asia, lifestyle, daily life, city, real situation, authentic, outdoor, people, environment`
  };
}

async function generateAll() {
  for (let item of files) {
    const context = await analyzeImage(item.file);
    item.meta = generateMeta(context);
  }

  render();
}
